<!DOCTYPE html>
<html lang="hy">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Մարիա 10</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Montserrat;
background:url("phone.png");
background-size:cover;
background-position:center;
overflow:hidden;
}

/* карточка */

.card{

width:380px;
padding:70px 50px;

background:rgba(255,255,255,0.65);
backdrop-filter:blur(10px);

border-radius:30px;

text-align:center;

box-shadow:0 30px 80px rgba(0,0,0,0.25);

}

/* текст */

.invite{
font-size:20px;
margin-bottom:15px;
}

.subtitle{
font-size:22px;
margin-bottom:10px;
}

.title{
font-size:56px;
font-weight:600;
margin-bottom:25px;
}

/* блок даты */

.dateBlock{

display:flex;
align-items:center;
justify-content:center;
gap:20px;

margin:20px 0 35px 0;

}

.line{

width:50px;
height:2px;
background:gold;

}

.date{
font-size:24px;
}

.time{
font-size:20px;
margin-top:4px;
}

/* место */

.place{
font-size:24px;
margin-bottom:10px;
}

.address{
font-size:22px;
margin-bottom:5px;
}

.restaurant{
font-size:22px;
}

/* частицы */

.particle{

position:fixed;

width:5px;
height:5px;

background:gold;

border-radius:50%;

pointer-events:none;

opacity:0.8;

animation:fall linear infinite;

}

@keyframes fall{

0%{
transform:translateY(-50px);
opacity:0;
}

10%{
opacity:1;
}

100%{
transform:translateY(110vh);
opacity:0;
}

}

</style>

</head>

<body>

<div class="card">

<div class="invite">
Հրավիրվում եք Ձեզ հետ կիսելու այս օրը
</div>

<div class="subtitle">
Ծննդյան տարեդարձը
</div>

<div class="title">
Մարիա 10
</div>

<div class="dateBlock">

<div class="line"></div>

<div>
<div class="date">25 Մարտի 2026</div>
<div class="time">17:30</div>
</div>

<div class="line"></div>

</div>

<div class="place">Գյումրի</div>

<div class="address">Ալեք Մանուկյան 8</div>

<div class="restaurant">Igit Restaurant</div>

</div>

<script>

/* генерация частиц */

for(let i=0;i<60;i++){

let p=document.createElement("div")
p.className="particle"

p.style.left=Math.random()*window.innerWidth+"px"

p.style.top=Math.random()*window.innerHeight+"px"

p.style.animationDuration=(6+Math.random()*8)+"s"

p.style.animationDelay=Math.random()*6+"s"

document.body.appendChild(p)

}

</script>

</body>
</html>
